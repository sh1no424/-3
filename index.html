<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Особенное Приглашение ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4081;
            --primary-dark: #f50057;
            --text: #2c3e50;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: #fff5f7;
            background: radial-gradient(circle at center, #ffffff 0%, #ffe4e9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        #bg-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .tilt-container {
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            perspective: 1000px;
        }

        /* Анимация плавного появления карточки при загрузке */
        @keyframes floatIn {
            0% { transform: translateY(40px) scale(0.95); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 60px 40px;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,255,255,0.8);
            text-align: center;
            max-width: 450px;
            width: 85%;
            transform-style: preserve-3d;
            /* Более плавный переход для параллакса и трансформаций */
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), 
                        opacity 0.4s ease-in-out, 
                        box-shadow 0.4s ease;
            border: 1px solid rgba(255, 182, 193, 0.4);
            animation: floatIn 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .card:hover {
            box-shadow: 0 35px 65px rgba(255, 64, 129, 0.15), inset 0 0 0 1px rgba(255,255,255,0.9);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            font-size: 3.5rem;
            margin: 0 0 20px;
            background: linear-gradient(45deg, #ff4081, #ff80ab, #ad1457);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .message {
            font-size: 1.1rem;
            color: #546e7a;
            line-height: 1.7;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .details {
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 64, 129, 0.03);
            border-radius: 20px;
            border: 1px dashed rgba(255, 64, 129, 0.2);
            transition: all 0.3s ease;
        }

        .details:hover {
            background: rgba(255, 64, 129, 0.06);
            transform: translateY(-2px);
        }

        .details p {
            margin: 10px 0;
            font-size: 1.1rem;
            color: var(--text);
        }

        .details b { color: var(--primary); font-weight: 600; }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            min-height: 60px;
        }

        button {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            padding: 16px 32px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 0.5px;
        }

        #btn-yes {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px rgba(255, 64, 129, 0.3);
            animation: pulse 2s infinite;
        }

        #btn-yes:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(255, 64, 129, 0.5);
            animation: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 10px 20px rgba(255, 64, 129, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 15px 25px rgba(255, 64, 129, 0.4); }
            100% { transform: scale(1); box-shadow: 0 10px 20px rgba(255, 64, 129, 0.3); }
        }

        #btn-no {
            background: #fff;
            color: #90a4ae;
            border: 1px solid #eceff1;
        }

        /* Улучшенные сердечки с покачиванием */
        .heart {
            position: absolute;
            pointer-events: none;
            animation: floatUp linear infinite;
            z-index: 2;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) translateX(0) scale(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; transform: translateY(80vh) translateX(20px) scale(0.8) rotate(45deg); }
            50% { transform: translateY(40vh) translateX(-20px) scale(1.2) rotate(180deg); }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) translateX(20px) scale(1.5) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.8rem; }
            .card { padding: 40px 25px; }
            button { padding: 14px 24px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="hearts-container"></div>

    <div class="tilt-container">
        <div class="card" id="invite-card">
            <h1>Для тебя ✨</h1>
            <p class="message">Поздравляю с праздником моя любимая девушка</p>
            
            <div class="details">
                <p>📍 Встречаемся в <b>Искры</b></p>
                <p>🕕 Жду тебя в <b>18:00</b></p>
            </div>

            <div class="buttons">
                <button id="btn-yes">Да, я приду! 💖</button>
                <button id="btn-no">Нет</button>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('invite-card');
        const container = document.getElementById('hearts-container');
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        let parallaxEnabled = true;

        // --- 1. Плавный параллакс эффект ---
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 1024 || !parallaxEnabled) return;
            const xAxis = (window.innerWidth / 2 - e.pageX) / 35; // Сделали движение чуть мягче
            const yAxis = (window.innerHeight / 2 - e.pageY) / 35;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Отключаем параллакс при уходе мыши, чтобы карточка возвращалась в центр
        document.addEventListener('mouseleave', () => {
            if(!parallaxEnabled) return;
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // --- 2. Улучшенная генерация сердечек (Чаще и красивее) ---
        function createHeart() {
            const heart = document.createElement('div');
            const icons = ['❤', '💖', '✨', '🌸', '💕'];
            heart.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            heart.className = 'heart';
            
            const size = Math.random() * 20 + 10;
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = size + 'px';
            // Добавляем немного разнообразных оттенков розового и золотого
            heart.style.color = `hsl(${Math.random() * 40 + 330}, 100%, 75%)`;
            heart.style.animationDuration = Math.random() * 4 + 4 + 's'; // Немного ускорили
            heart.style.opacity = Math.random() * 0.5 + 0.5;
            
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 8000);
        }
        // Запускаем чаще (каждые 120мс вместо 300мс)
        setInterval(createHeart, 120);

        // --- 3. Убегающая кнопка ---
        const moveNo = () => {
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 40) + 20;
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
            btnNo.style.zIndex = '1000';
        };

        btnNo.addEventListener('mouseover', moveNo);
        btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); moveNo(); }, {passive: false});

        // --- 4. Эффектный 3D-переворот при нажатии "Да" ---
        btnYes.addEventListener('click', () => {
            parallaxEnabled = false; // Отключаем параллакс на время анимации
            
            // Начинаем переворот карточки
            card.style.transform = "rotateY(90deg) scale(0.9)";
            card.style.opacity = "0.5";
            
            setTimeout(() => {
                // Меняем контент в середине переворота
                card.innerHTML = `
                    <h1 style="font-size: 3rem; margin-top: 20px;">До встречи! 🎉</h1>
                    <p class="message" style="font-weight: 500; font-size: 1.2rem;">ждууу</p>
                    <div class="details" style="background: rgba(255, 64, 129, 0.08);">
                        <p>📍 <b>Искры</b> | 🕕 <b>18:00</b></p>
                    </div>
                    <p style="color: #ff4081; font-size: 2.5rem; margin-top: 10px;">💖✨🥂</p>
                `;
                
                // Завершаем переворот карточки лицом к пользователю
                card.style.transform = "rotateY(0deg) scale(1.05)";
                card.style.opacity = "1";
                card.style.boxShadow = "0 35px 70px rgba(255, 64, 129, 0.25)";
                
                // Взрыв конфетти из сердечек
                for(let i = 0; i < 80; i++) {
                    setTimeout(createHeart, i * 15);
                }
            }, 400); // Половина времени от transition в CSS (0.4s)
        });
    </script>
</body>
</html>
